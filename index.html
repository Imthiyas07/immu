<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Modern Layout</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

body{

font-family:Poppins,sans-serif;

background:
linear-gradient(135deg,#0f172a,#111827,#1e293b);

overflow-x:hidden;

}

.glass{

backdrop-filter:blur(18px);

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 20px 50px rgba(0,0,0,.4);

}

.card{

transition:.45s;

transform-style:preserve-3d;

}

.card:hover{

transform:
rotateX(8deg)
rotateY(-8deg)
translateY(-8px)
scale(1.03);

box-shadow:
0 30px 60px rgba(0,0,0,.45);

}

.float{

animation:float 4s ease-in-out infinite;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-10px);

}

}

.btn{

transition:.35s;

}

.btn:hover{

transform:
translateY(-5px)
scale(1.05);

box-shadow:
0 15px 35px rgba(59,130,246,.4);

}

</style>

</head>

<body class="min-h-screen flex justify-center items-center p-6">

<div
class="glass rounded-[35px] p-6 w-full max-w-md lg:max-w-lg card">

<!-- Top -->

<div class="flex items-center gap-3">

<div
class="w-6 h-6 rounded-full bg-white/30 float"></div>

<div
class="flex-1 h-5 rounded-full bg-white/20"></div>

<div
class="w-7 h-7 rounded-full bg-white/30 float"></div>

</div>

<!-- Banner -->

<div
class="mt-10 rounded-3xl h-60 bg-gradient-to-br
from-blue-500
via-indigo-500
to-purple-600
relative overflow-hidden card">

<div
class="absolute inset-0 bg-black/10"></div>

<div
class="absolute -right-10 -top-10
w-44 h-44 rounded-full bg-white/20 blur-3xl"></div>

<div
class="absolute -left-10 bottom-0
w-36 h-36 rounded-full bg-cyan-300/20 blur-3xl"></div>

<div
class="absolute inset-0 flex justify-center items-center">

<h1 class="text-white text-3xl font-bold">

Banner

</h1>

</div>

</div>

<!-- Center Text -->

<div class="mt-10 flex justify-center">

<div
class="h-6 rounded-lg w-56 bg-white/20"></div>

</div>

<div class="mt-5 flex justify-center">

<div
class="h-6 rounded-lg w-48 bg-white/20"></div>

</div>

<!-- Right Button -->

<div class="flex justify-end mt-24">

<button
onclick="rightClick()"
class="btn px-10 py-4 rounded-xl
bg-gradient-to-r
from-blue-500
to-cyan-400
text-white font-semibold">

Right

</button>

</div>

<!-- Left Button -->

<div class="flex justify-start mt-20">

<button
onclick="leftClick()"
class="btn px-10 py-4 rounded-xl
bg-gradient-to-r
from-pink-500
to-purple-500
text-white font-semibold">

Left

</button>

</div>

</div>

<script>

function rightClick(){

alert("Right Button Clicked 🚀");

}

function leftClick(){

alert("Left Button Clicked 🎉");

}

const cards=document.querySelectorAll(".card");

cards.forEach(card=>{

card.addEventListener("mousemove",(e)=>{

const rect=card.getBoundingClientRect();

const x=e.clientX-rect.left;

const y=e.clientY-rect.top;

const centerX=rect.width/2;

const centerY=rect.height/2;

const rotateY=((x-centerX)/20);

const rotateX=((centerY-y)/20);

card.style.transform=`
rotateX(${rotateX}deg)
rotateY(${rotateY}deg)
scale(1.03)
`;

});

card.addEventListener("mouseleave",()=>{

card.style.transform="rotateX(0deg) rotateY(0deg)";

});

});

</script>

</body>
</html>
